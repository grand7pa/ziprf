<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Презентация</title>
  <meta name="robots" content="noindex, nofollow">

  <style>
    :root {
      --bg: #0b0d10;
      --panel: rgba(16, 20, 28, 0.94);
      --text: #ffffff;
      --muted: rgba(255,255,255,.68);
      --line: rgba(255,255,255,.14);
      --button: rgba(255,255,255,.09);
      --button-hover: rgba(255,255,255,.16);
      --paper: #ffffff;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 10% 0%, rgba(237, 28, 36, .16), transparent 28rem),
        radial-gradient(circle at 90% 10%, rgba(255, 255, 255, .08), transparent 24rem),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body { overflow-y: scroll; }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
      box-shadow: 0 10px 36px rgba(0,0,0,.28);
    }

    .title {
      min-width: 0;
      margin-right: auto;
    }

    .title__main {
      overflow: hidden;
      max-width: 52vw;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.15;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .title__sub {
      margin-top: 3px;
      font-size: 12px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button, a.button {
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--button);
      color: var(--text);
      font: inherit;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    button, a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      padding: 0 14px;
      user-select: none;
    }

    button:hover, a.button:hover { background: var(--button-hover); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .zoom {
      min-width: 54px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    .viewer-wrap {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 22px 16px 44px;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 82px);
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
      line-height: 1.45;
    }

    .status strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 18px;
    }

    .page {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 22px;
      padding: 10px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.07);
      box-shadow: 0 20px 70px rgba(0,0,0,.36);
    }

    .page-number {
      padding: 0 4px 8px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      background: var(--paper);
    }

    .hidden { display: none !important; }

    @media (max-width: 760px) {
      .toolbar {
        flex-wrap: wrap;
        padding: 10px;
      }

      .title {
        width: 100%;
        margin-right: 0;
      }

      .title__main {
        max-width: 100%;
        white-space: normal;
      }

      .controls { flex: 1 1 auto; }
      .download-controls { width: 100%; }
      .download-controls .button { flex: 1 1 0; }

      .viewer-wrap {
        padding: 14px 8px 30px;
      }

      .page {
        margin-bottom: 14px;
        padding: 6px;
        border-radius: 12px;
      }

      canvas { border-radius: 8px; }
    }
  </style>
</head>

<body>
  <header class="toolbar">
    <div class="title">
      <div class="title__main" id="docTitle">Презентация</div>
      <div class="title__sub" id="docMeta">Загрузка PDF…</div>
    </div>

    <div class="controls">
      <button id="zoomOut" type="button" title="Уменьшить">−</button>
      <div class="zoom" id="zoomValue">100%</div>
      <button id="zoomIn" type="button" title="Увеличить">+</button>
    </div>

    <div class="controls download-controls">
      <a class="button" id="openPdf" target="_blank" rel="noopener">Открыть PDF</a>
      <a class="button" id="downloadPdf" download>Скачать</a>
    </div>
  </header>

  <main class="viewer-wrap">
    <div id="status" class="status">Загрузка PDF…</div>
    <section id="viewer"></section>
  </main>

  <script type="module">
    /*
      Как пользоваться:
      1. Положи PDF рядом с этим index.html.
      2. Назови PDF presentation.pdf.
      3. Или передай имя файла в ссылке: /?file=my-presentation.pdf
    */

    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/build/pdf.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/build/pdf.worker.mjs';

    const DEFAULT_PDF = 'presentation.pdf';

    const params = new URLSearchParams(window.location.search);
    const requestedFile = params.get('file');
    const pdfFile = sanitizeFileName(requestedFile || DEFAULT_PDF);

    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');
    const docTitle = document.getElementById('docTitle');
    const docMeta = document.getElementById('docMeta');
    const zoomOut = document.getElementById('zoomOut');
    const zoomIn = document.getElementById('zoomIn');
    const zoomValue = document.getElementById('zoomValue');
    const openPdf = document.getElementById('openPdf');
    const downloadPdf = document.getElementById('downloadPdf');

    let pdfDoc = null;
    let zoom = 1;
    let renderToken = 0;
    let resizeTimer = null;

    docTitle.textContent = prettyName(pdfFile);
    openPdf.href = encodeURI(pdfFile);
    downloadPdf.href = encodeURI(pdfFile);
    downloadPdf.setAttribute('download', pdfFile);

    zoomOut.addEventListener('click', () => {
      zoom = Math.max(0.6, Number((zoom - 0.1).toFixed(2)));
      updateZoom();
      renderAllPages();
    });

    zoomIn.addEventListener('click', () => {
      zoom = Math.min(2.2, Number((zoom + 0.1).toFixed(2)));
      updateZoom();
      renderAllPages();
    });

    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (pdfDoc) renderAllPages();
      }, 250);
    });

    loadPdf();

    async function loadPdf() {
      try {
        docMeta.textContent = 'Загрузка PDF…';

        pdfDoc = await pdfjsLib.getDocument({
          url: encodeURI(pdfFile),
          cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/cmaps/',
          cMapPacked: true,
          standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/standard_fonts/'
        }).promise;

        docMeta.textContent = `${pdfDoc.numPages} стр.`;
        updateZoom();
        await renderAllPages();
      } catch (error) {
        console.error(error);
        viewer.innerHTML = '';
        status.classList.remove('hidden');
        status.innerHTML = `
          <div>
            <strong>PDF не загрузился</strong>
            Проверь, что файл лежит рядом с index.html и называется:<br>
            <b>${escapeHtml(pdfFile)}</b>
          </div>
        `;
      }
    }

    async function renderAllPages() {
      if (!pdfDoc) return;

      const token = ++renderToken;
      viewer.innerHTML = '';
      status.classList.remove('hidden');
      status.textContent = 'Отрисовка страниц…';

      const containerWidth = document.querySelector('.viewer-wrap').clientWidth - 32;
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);

      for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber++) {
        if (token !== renderToken) return;

        const page = await pdfDoc.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });
        const fitScale = Math.min(containerWidth / baseViewport.width, 1.45);
        const viewport = page.getViewport({ scale: fitScale * zoom });

        const pageBox = document.createElement('article');
        pageBox.className = 'page';

        const pageLabel = document.createElement('div');
        pageLabel.className = 'page-number';
        pageLabel.textContent = `Страница ${pageNumber} из ${pdfDoc.numPages}`;

        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d', { alpha: false });

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;

        pageBox.appendChild(pageLabel);
        pageBox.appendChild(canvas);
        viewer.appendChild(pageBox);

        await page.render({
          canvasContext: context,
          viewport,
          transform: outputScale !== 1
            ? [outputScale, 0, 0, outputScale, 0, 0]
            : null
        }).promise;
      }

      if (token === renderToken) {
        status.classList.add('hidden');
      }
    }

    function updateZoom() {
      zoomValue.textContent = `${Math.round(zoom * 100)}%`;
      zoomOut.disabled = zoom <= 0.6;
      zoomIn.disabled = zoom >= 2.2;
    }

    function sanitizeFileName(value) {
      const file = String(value || DEFAULT_PDF).trim();

      if (!file || file.includes('://') || file.includes('..') || file.startsWith('/')) {
        return DEFAULT_PDF;
      }

      return file;
    }

    function prettyName(file) {
      return decodeURIComponent(file)
        .replace(/\.pdf$/i, '')
        .replaceAll('_', ' ')
        .replaceAll('-', ' ');
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
