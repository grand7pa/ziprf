<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Инструкция, если получили повестку</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
    }
    .pdf-frame {
      width: 100%;
      height: 100vh;
      border: 0;
      display: block;
      background: #111;
    }
  </style>
</head>
<body>
  <iframe class="pdf-frame" id="pdfFrame" src="./presentation.pdf"></iframe>

  <script>
    (function () {
      const isMobile = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent)
        || window.innerWidth < 980;

      if (isMobile) {
        // На телефоне открываем PDF напрямую, без iframe
        window.location.replace('./presentation.pdf');
      }
    })();
  </script>
</body>
</html>
