<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Презентация для призывников — защита ваших интересов</title>
  <meta name="description" content="Презентация о законной помощи призывникам. Изучите материалы и оставьте заявку на консультацию.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Russo+One&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0d10;
      --panel: rgba(11, 13, 16, 0.94);
      --line: rgba(255, 255, 255, 0.12);
      --line-strong: rgba(255, 255, 255, 0.22);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.66);
      --muted-2: rgba(255, 255, 255, 0.46);
      --red: #ed1c24;
      --red-hover: #ff3038;
      --font-text: "Montserrat", Arial, Helvetica, sans-serif;
      --font-title: "Russo One", Impact, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-text);
    }

    body {
      overflow-y: scroll;
    }

    .site {
      min-height: 100vh;
      background: linear-gradient(180deg, #0b0d10 0%, #101317 48%, #0b0d10 100%);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .topbar__inner {
      width: min(1240px, calc(100% - 32px));
      min-height: 78px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(150px, 1fr) auto;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      text-decoration: none;
    }

    .brand__logo {
      width: 154px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      min-width: 0;
    }

    button,
    .button {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      font-family: var(--font-text);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      outline: none;
      user-select: none;
      transition:
        background 0.18s ease,
        border-color 0.18s ease,
        transform 0.18s ease,
        opacity 0.18s ease;
    }

    button {
      min-width: 42px;
      padding: 0 14px;
      line-height: 1;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      white-space: nowrap;
    }

    button:hover,
    .button:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.06);
    }

    button:active,
    .button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .button--red {
      border-color: var(--red);
      background: var(--red);
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .button--red:hover {
      border-color: var(--red-hover);
      background: var(--red-hover);
    }

    .icon-button {
      font-size: 18px;
    }

    .nav-button {
      min-width: 118px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .zoom {
      min-width: 54px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .viewer-shell {
      width: min(1240px, 100%);
      margin: 0 auto;
      padding: 18px 0 0;
    }

    .status {
      min-height: 320px;
      display: grid;
      place-items: center;
      padding: 32px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      font-weight: 500;
    }

    .status strong {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
    }

    .pdf-page {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 20px;
      line-height: 0;
      scroll-margin-top: 96px;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      background: #fff;
      box-shadow: 0 20px 54px rgba(0, 0, 0, 0.34);
    }

    .cta {
      width: min(980px, calc(100% - 32px));
      margin: 34px auto 56px;
      padding: clamp(26px, 5vw, 46px);
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(237, 28, 36, 0.15), rgba(237, 28, 36, 0) 42%),
        rgba(255, 255, 255, 0.035);
      text-align: center;
    }

    .cta__eyebrow {
      color: var(--red);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .cta__title {
      max-width: 780px;
      margin: 12px auto 0;
      font-family: var(--font-title);
      font-size: clamp(26px, 4.8vw, 48px);
      line-height: 1.05;
      font-weight: 400;
      text-transform: uppercase;
    }

    .cta__text {
      max-width: 660px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      font-weight: 500;
    }

    .cta__phone {
      display: inline-block;
      margin-top: 24px;
      color: var(--text);
      font-size: clamp(26px, 5vw, 42px);
      line-height: 1;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: -0.04em;
    }

    .cta__time {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }

    .cta__actions {
      margin-top: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 840px) {
      .topbar__inner {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 12px 0;
      }

      .controls {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 2px;
      }

      .brand__logo {
        width: 132px;
      }

      .viewer-shell {
        padding-top: 12px;
      }

      .pdf-page {
        scroll-margin-top: 145px;
      }
    }

    @media (max-width: 560px) {
      .topbar__inner {
        width: calc(100% - 20px);
        min-height: 0;
      }

      .brand__logo {
        width: 118px;
      }

      .controls {
        gap: 6px;
      }

      button {
        height: 39px;
        min-width: 38px;
        padding: 0 11px;
      }

      .button {
        height: 40px;
        padding: 0 15px;
        font-size: 12px;
      }

      .button--red {
        letter-spacing: 0;
      }

      .nav-button {
        min-width: auto;
        font-size: 0;
        width: 40px;
        padding: 0;
      }

      .nav-button--prev::before {
        content: "↑";
        font-size: 17px;
      }

      .nav-button--next::before {
        content: "↓";
        font-size: 17px;
      }

      .zoom {
        min-width: 48px;
      }

      .pdf-page {
        margin-bottom: 10px;
        scroll-margin-top: 138px;
      }

      canvas {
        box-shadow: none;
      }

      .cta {
        width: calc(100% - 20px);
        margin-top: 24px;
        margin-bottom: 34px;
      }

      .cta__text {
        font-size: 14px;
      }

      .cta__actions {
        display: grid;
      }

      .cta__actions .button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="site">
    <header class="topbar">
      <div class="topbar__inner">
        <a class="brand" href="./" aria-label="Защита интересов призывника">
          <img class="brand__logo" src="LOGOZIP.svg" alt="Защита интересов призывника">
        </a>

        <div class="controls" aria-label="Управление презентацией">
          <button class="nav-button nav-button--prev" id="prevPage" type="button">Назад</button>
          <button class="nav-button nav-button--next" id="nextPage" type="button">Далее</button>

          <button class="icon-button" id="zoomOut" type="button" title="Уменьшить">−</button>
          <div class="zoom" id="zoomValue">100%</div>
          <button class="icon-button" id="zoomIn" type="button" title="Увеличить">+</button>
        </div>
      </div>
    </header>

    <section class="viewer-shell">
      <div id="status" class="status">Загрузка презентации…</div>
      <div id="viewer"></div>
    </section>

    <section class="cta" id="consultation">
      <div class="cta__eyebrow">Бесплатная консультация</div>
      <h1 class="cta__title">Остались вопросы по вашей ситуации?</h1>
      <p class="cta__text">
        Оставьте заявку или позвоните нам. Разберём документы, оценим перспективы и подскажем,
        какие законные шаги можно сделать уже сейчас.
      </p>

      <a class="cta__phone" href="tel:+79373337999">+7 (937) 333-7-999</a>
      <div class="cta__time">Ежедневно · с 9:00 до 20:00</div>

      <div class="cta__actions">
        <a class="button button--red" href="https://zip-rf.ru/?utm_source=lead_magnet&utm_medium=pdf&utm_campaign=lm_povestka72&utm_content=cta_final#finalcta">Оставить заявку</a>
        <a class="button" href="tel:+79373337999">Позвонить</a>
      </div>
    </section>
  </main>

  <script type="module">
    import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/build/pdf.mjs';

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/build/pdf.worker.mjs';

    const PDF_FILE = 'presentation.pdf';

    const viewer = document.getElementById('viewer');
    const status = document.getElementById('status');
    const zoomOut = document.getElementById('zoomOut');
    const zoomIn = document.getElementById('zoomIn');
    const zoomValue = document.getElementById('zoomValue');
    const prevPage = document.getElementById('prevPage');
    const nextPage = document.getElementById('nextPage');
    const cta = document.getElementById('consultation');

    let pdfDoc = null;
    let zoom = 1;
    let renderToken = 0;
    let resizeTimer = null;
    let currentPageIndex = 0;

    loadPdf();

    zoomOut.addEventListener('click', () => {
      zoom = Math.max(0.65, Number((zoom - 0.1).toFixed(2)));
      updateZoom();
      renderAllPages().then(() => scrollToPage(currentPageIndex));
    });

    zoomIn.addEventListener('click', () => {
      zoom = Math.min(2.1, Number((zoom + 0.1).toFixed(2)));
      updateZoom();
      renderAllPages().then(() => scrollToPage(currentPageIndex));
    });

    prevPage.addEventListener('click', () => {
      updateCurrentPageByScroll();

      if (isCtaVisible()) {
        scrollToPage(getPageElements().length - 1);
        return;
      }

      scrollToPage(Math.max(currentPageIndex - 1, 0));
    });

    nextPage.addEventListener('click', () => {
      updateCurrentPageByScroll();

      const pages = getPageElements();

      if (!pages.length) return;

      if (currentPageIndex >= pages.length - 1) {
        cta.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return;
      }

      scrollToPage(currentPageIndex + 1);
    });

    window.addEventListener('scroll', () => {
      updateCurrentPageByScroll();
      updateNavButtons();
    }, { passive: true });

    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (pdfDoc) {
          renderAllPages().then(() => scrollToPage(currentPageIndex));
        }
      }, 220);
    });

    async function loadPdf() {
      renderToken++;
      viewer.innerHTML = '';
      status.classList.remove('hidden');
      status.textContent = 'Загрузка презентации…';

      try {
        const loadingTask = pdfjsLib.getDocument({
          url: encodeURI(PDF_FILE),
          cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/cmaps/',
          cMapPacked: true,
          standardFontDataUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@6.0.227/standard_fonts/'
        });

        pdfDoc = await loadingTask.promise;
        updateZoom();
        await renderAllPages();
      } catch (error) {
        console.error(error);
        viewer.innerHTML = '';
        status.classList.remove('hidden');
        status.innerHTML = `
          <div>
            <strong>PDF не загрузился</strong>
            Проверь, что файл лежит рядом с index.html и называется <b>presentation.pdf</b>.
          </div>
        `;
      }
    }

    async function renderAllPages() {
      if (!pdfDoc) return;

      const token = ++renderToken;
      viewer.innerHTML = '';
      status.classList.remove('hidden');
      status.textContent = 'Отрисовка презентации…';

      const shellWidth = document.querySelector('.viewer-shell').clientWidth;
      const sidePadding = window.innerWidth <= 560 ? 0 : 32;
      const containerWidth = shellWidth - sidePadding;
      const outputScale = Math.min(window.devicePixelRatio || 1, 2);

      for (let pageNumber = 1; pageNumber <= pdfDoc.numPages; pageNumber++) {
        if (token !== renderToken) return;

        const page = await pdfDoc.getPage(pageNumber);
        const baseViewport = page.getViewport({ scale: 1 });

        const fitScale = Math.min(containerWidth / baseViewport.width, 1.35);
        const viewport = page.getViewport({ scale: fitScale * zoom });

        const pageBox = document.createElement('article');
        pageBox.className = 'pdf-page';
        pageBox.dataset.page = String(pageNumber);

        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d', { alpha: false });

        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${Math.floor(viewport.width)}px`;
        canvas.style.height = `${Math.floor(viewport.height)}px`;

        pageBox.appendChild(canvas);
        viewer.appendChild(pageBox);

        await page.render({
          canvasContext: context,
          viewport,
          transform: outputScale !== 1
            ? [outputScale, 0, 0, outputScale, 0, 0]
            : null
        }).promise;
      }

      if (token === renderToken) {
        status.classList.add('hidden');
        updateCurrentPageByScroll();
        updateNavButtons();
      }
    }

    function getPageElements() {
      return Array.from(document.querySelectorAll('.pdf-page'));
    }

    function getHeaderOffset() {
      const topbar = document.querySelector('.topbar');
      return topbar ? topbar.offsetHeight + 14 : 0;
    }

    function scrollToPage(index) {
      const pages = getPageElements();
      if (!pages.length) return;

      const safeIndex = Math.max(0, Math.min(index, pages.length - 1));
      currentPageIndex = safeIndex;

      const y = pages[safeIndex].getBoundingClientRect().top + window.scrollY - getHeaderOffset();
      window.scrollTo({ top: y, behavior: 'smooth' });

      updateNavButtons();
    }

    function updateCurrentPageByScroll() {
      const pages = getPageElements();
      if (!pages.length) return;

      const referenceY = window.scrollY + getHeaderOffset() + 40;
      let activeIndex = 0;

      pages.forEach((page, index) => {
        if (page.offsetTop <= referenceY) {
          activeIndex = index;
        }
      });

      currentPageIndex = activeIndex;
    }

    function isCtaVisible() {
      const rect = cta.getBoundingClientRect();
      return rect.top < window.innerHeight * 0.55 && rect.bottom > 120;
    }

    function updateNavButtons() {
      const pages = getPageElements();

      if (!pages.length) {
        prevPage.disabled = true;
        nextPage.disabled = true;
        return;
      }

      const atTop = currentPageIndex <= 0 && !isCtaVisible();
      prevPage.disabled = atTop;
      nextPage.disabled = false;
    }

    function updateZoom() {
      zoomValue.textContent = `${Math.round(zoom * 100)}%`;
      zoomOut.disabled = zoom <= 0.65;
      zoomIn.disabled = zoom >= 2.1;
    }
  </script>
</body>
</html>
